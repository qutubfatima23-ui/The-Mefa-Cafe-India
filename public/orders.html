<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - The Mefa Cafe India</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <!-- NAVIGATION BAR -->
    <nav class="bg-gray-900 text-white sticky top-0 z-50 shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black tracking-wider text-orange-500">THE MEFA CAFE</a>
            <div class="flex items-center space-x-4">
                <a href="index.html#menu" class="hover:text-orange-500 transition">Menu</a>
                <a href="index.html" class="bg-orange-500 hover:bg-orange-600 text-white px-4 py-2 rounded-full font-bold transition text-sm">Back Home</a>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <section class="max-w-6xl mx-auto px-4 py-16">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-black mb-2">Your Orders</h1>
            <p class="text-gray-500">Track your orders and their status</p>
        </div>

        <div id="orders-container" class="grid md:grid-cols-2 gap-6">
            <div class="text-center text-gray-500 md:col-span-2 py-12">
                <p>Loading your orders...</p>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="bg-gray-950 text-gray-500 text-center py-8 border-t border-gray-900 text-sm">
        <p class="mb-2 text-gray-400 font-bold">&copy; 2026 The Mefa Cafe India. All Rights Reserved.</p>
        <p class="text-xs">Crafting delicious moments one fresh bite at a time.</p>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script>
        const getStatusColor = (status) => {
            const colors = {
                placed: 'blue',
                confirmed: 'purple',
                preparing: 'yellow',
                ready: 'green',
                out_for_delivery: 'indigo',
                delivered: 'emerald',
                cancelled: 'red'
            };
            return colors[status] || 'gray';
        };

        async function loadOrders() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const response = await api.getOrders(token);
                const container = document.getElementById('orders-container');

                if (response.orders && response.orders.length > 0) {
                    container.innerHTML = response.orders.map(order => `
                        <div class="bg-white rounded-2xl border border-gray-200 shadow-md overflow-hidden hover:shadow-lg transition">
                            <div class="bg-gradient-to-r from-orange-500 to-orange-600 text-white p-4">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <p class="text-sm opacity-90">Order ID</p>
                                        <p class="text-lg font-bold">${order.orderId}</p>
                                    </div>
                                    <span class="bg-white/20 text-white px-3 py-1 rounded-full text-xs font-bold">
                                        ${new Date(order.createdAt).toLocaleDateString()}
                                    </span>
                                </div>
                            </div>

                            <div class="p-6 space-y-4">
                                <div class="grid grid-cols-2 gap-4 text-sm">
                                    <div>
                                        <p class="text-gray-500">Items</p>
                                        <p class="font-bold text-lg">${order.items.length}</p>
                                    </div>
                                    <div>
                                        <p class="text-gray-500">Total</p>
                                        <p class="font-bold text-lg text-orange-600">₹${order.total}</p>
                                    </div>
                                </div>

                                <div>
                                    <p class="text-xs text-gray-500 uppercase tracking-wide mb-2">Status</p>
                                    <div class="flex items-center gap-2">
                                        <div class="w-3 h-3 rounded-full bg-${getStatusColor(order.orderstatus)}-500"></div>
                                        <span class="capitalize font-semibold">${order.orderstatus.replace('_', ' ')}</span>
                                    </div>
                                </div>

                                <div>
                                    <p class="text-xs text-gray-500 uppercase tracking-wide mb-2">Items</p>
                                    <div class="space-y-1 text-sm">
                                        ${order.items.map(item => `
                                            <p class="text-gray-700">${item.name} x ${item.quantity}</p>
                                        `).join('')}
                                    </div>
                                </div>

                                <div>
                                    <p class="text-xs text-gray-500 uppercase tracking-wide mb-2">Payment Status</p>
                                    <span class="inline-block px-3 py-1 rounded-full text-xs font-bold ${order.paymentStatus === 'completed' ? 'bg-emerald-100 text-emerald-700' : 'bg-yellow-100 text-yellow-700'}">
                                        ${order.paymentStatus}
                                    </span>
                                </div>

                                ${order.estimatedDeliveryTime ? `
                                    <div>
                                        <p class="text-xs text-gray-500 uppercase tracking-wide mb-1">Est. Delivery</p>
                                        <p class="text-sm font-semibold">${new Date(order.estimatedDeliveryTime).toLocaleString()}</p>
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<div class="col-span-2 text-center py-12"><i class="fas fa-inbox text-4xl text-gray-300 mb-4"></i><p class="text-gray-500 text-lg">No orders yet</p><a href="index.html" class="text-orange-500 font-bold hover:underline">Start ordering now →</a></div>';
                }
            } catch (error) {
                console.error('Error loading orders:', error);
                alert('Failed to load orders');
            }
        }

        window.addEventListener('DOMContentLoaded', loadOrders);
    </script>
</body>
</html>
