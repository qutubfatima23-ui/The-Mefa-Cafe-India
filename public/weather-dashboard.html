<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard - Mefa Cafe India</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            animation: fadeIn 0.8s ease-in;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1rem;
            opacity: 0.9;
        }

        .search-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
            animation: slideDown 0.6s ease-out;
        }

        .search-box {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 500px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .search-box button {
            padding: 12px 25px;
            font-size: 1rem;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .location-btn {
            padding: 12px 25px;
            font-size: 1.2rem;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .location-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .quick-cities {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 30px;
        }

        .city-btn {
            padding: 8px 15px;
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .city-btn:hover {
            background: white;
            color: #667eea;
            transform: translateY(-2px);
        }

        .main-weather {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
            animation: slideUp 0.6s ease-out;
        }

        .weather-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .weather-title {
            font-size: 2rem;
            color: #333;
            font-weight: bold;
        }

        .weather-icon-large {
            font-size: 4rem;
        }

        .temperature-display {
            font-size: 3.5rem;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .weather-description {
            font-size: 1.2rem;
            color: #666;
            text-transform: capitalize;
            margin-bottom: 5px;
        }

        .feels-like {
            font-size: 1rem;
            color: #999;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .detail-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .detail-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .detail-label {
            font-size: 0.85rem;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .detail-value {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .forecast-section {
            margin-top: 30px;
        }

        .forecast-title {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
        }

        .forecast-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            transition: all 0.3s ease;
            animation: slideUp 0.6s ease-out;
        }

        .forecast-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .forecast-day {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .forecast-icon {
            font-size: 2.5rem;
            margin: 10px 0;
        }

        .forecast-temp {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .forecast-desc {
            font-size: 0.8rem;
            opacity: 0.8;
            text-transform: capitalize;
        }

        .error-message {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            animation: slideUp 0.6s ease-out;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            padding: 40px;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .no-data {
            text-align: center;
            color: white;
            padding: 40px;
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .main-weather {
                padding: 20px;
            }

            .weather-header {
                flex-direction: column;
                text-align: center;
            }

            .temperature-display {
                font-size: 2.5rem;
            }

            .weather-details {
                grid-template-columns: repeat(2, 1fr);
            }

            .forecast-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .search-box {
                flex-direction: column;
            }
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            opacity: 0.8;
            font-size: 0.9rem;
        }

        .weather-recommendations {
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid white;
            padding: 20px;
            border-radius: 15px;
            color: white;
            margin-top: 20px;
            font-size: 1.1rem;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌤️ Weather Dashboard</h1>
            <p>Get real-time weather information for any location</p>
        </div>

        <div class="search-section">
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search for a city..."
                    onkeypress="if(event.key==='Enter') searchWeather()"
                >
                <button onclick="searchWeather()">🔍 Search</button>
                <button class="location-btn" onclick="getLocationWeather()" title="Get weather for your location">📍</button>
            </div>
        </div>

        <div class="quick-cities">
            <button class="city-btn" onclick="searchCity('New Delhi')">New Delhi</button>
            <button class="city-btn" onclick="searchCity('Mumbai')">Mumbai</button>
            <button class="city-btn" onclick="searchCity('London')">London</button>
            <button class="city-btn" onclick="searchCity('New York')">New York</button>
            <button class="city-btn" onclick="searchCity('Tokyo')">Tokyo</button>
            <button class="city-btn" onclick="searchCity('Sydney')">Sydney</button>
            <button class="city-btn" onclick="searchCity('Dubai')">Dubai</button>
            <button class="city-btn" onclick="searchCity('Singapore')">Singapore</button>
        </div>

        <div id="errorContainer"></div>
        <div id="loadingContainer"></div>
        <div id="weatherContainer"></div>

        <div class="footer">
            <p>🌍 Weather data provided by OpenWeatherMap • Last updated: <span id="lastUpdate">--:--</span></p>
        </div>
    </div>

    <script>
        const API_BASE = '/api/weather';
        let lastUpdate = new Date();

        // Weather icon mapping
        function getWeatherIcon(iconCode) {
            const iconMap = {
                '01d': '☀️', '01n': '🌙',
                '02d': '🌤️', '02n': '🌤️',
                '03d': '☁️', '03n': '☁️',
                '04d': '☁️', '04n': '☁️',
                '09d': '🌧️', '09n': '🌧️',
                '10d': '🌧️', '10n': '🌧️',
                '11d': '⛈️', '11n': '⛈️',
                '13d': '❄️', '13n': '❄️',
                '50d': '🌫️', '50n': '🌫️'
            };
            return iconMap[iconCode] || '🌤️';
        }

        // Show loading state
        function showLoading() {
            document.getElementById('loadingContainer').innerHTML = `
                <div class="loading">
                    <span class="loading-spinner"></span>
                    Loading weather data...
                </div>
            `;
            document.getElementById('errorContainer').innerHTML = '';
            document.getElementById('weatherContainer').innerHTML = '';
        }

        // Show error message
        function showError(message) {
            document.getElementById('errorContainer').innerHTML = `
                <div class="error-message">
                    ⚠️ ${message}
                </div>
            `;
            document.getElementById('loadingContainer').innerHTML = '';
            document.getElementById('weatherContainer').innerHTML = '';
        }

        // Search weather by city name
        async function searchWeather() {
            const city = document.getElementById('searchInput').value.trim();
            if (!city) {
                showError('Please enter a city name');
                return;
            }
            searchCity(city);
        }

        // Search city and display weather
        async function searchCity(city) {
            showLoading();
            try {
                const response = await fetch(`${API_BASE}/current/${city}`);
                const data = await response.json();

                if (!response.ok) {
                    showError(data.message || 'City not found. Please try another search.');
                    return;
                }

                // Fetch forecast too
                const forecastResponse = await fetch(`${API_BASE}/forecast/${city}`);
                const forecastData = await forecastResponse.json();

                displayWeather(data, forecastData.forecast || []);
                lastUpdate = new Date();
                updateLastUpdate();
            } catch (error) {
                showError('Error fetching weather data. Please try again.');
                console.error(error);
            }
        }

        // Get weather using geolocation
        function getLocationWeather() {
            if (!navigator.geolocation) {
                showError('Geolocation is not supported by your browser');
                return;
            }

            showLoading();
            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const { latitude, longitude } = position.coords;
                    try {
                        const response = await fetch(
                            `${API_BASE}/coords?lat=${latitude}&lon=${longitude}`
                        );
                        const data = await response.json();

                        if (!response.ok) {
                            showError(data.message || 'Could not fetch weather for your location');
                            return;
                        }

                        // Fetch forecast
                        const forecastResponse = await fetch(
                            `${API_BASE}/forecast/${data.city}`
                        );
                        const forecastData = await forecastResponse.json();

                        displayWeather(data, forecastData.forecast || []);
                        lastUpdate = new Date();
                        updateLastUpdate();
                    } catch (error) {
                        showError('Error fetching weather data');
                        console.error(error);
                    }
                },
                (error) => {
                    showError('Please enable location access to get weather for your location');
                }
            );
        }

        // Display weather data
        function displayWeather(data, forecast) {
            document.getElementById('loadingContainer').innerHTML = '';
            document.getElementById('errorContainer').innerHTML = '';

            const weatherIcon = getWeatherIcon(data.icon || '01d');
            const sunrise = new Date(data.sunrise).toLocaleTimeString('en-US', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });
            const sunset = new Date(data.sunset).toLocaleTimeString('en-US', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });

            let forecastHTML = '';
            if (forecast && forecast.length > 0) {
                forecastHTML = `
                    <div class="forecast-section">
                        <h3 class="forecast-title">📅 5-Day Forecast</h3>
                        <div class="forecast-grid">
                            ${forecast.slice(0, 5).map((day, index) => `
                                <div class="forecast-card">
                                    <div class="forecast-day">${getDayName(index)}</div>
                                    <div class="forecast-icon">${getWeatherIcon(day.icon || '01d')}</div>
                                    <div class="forecast-temp">${Math.round(day.temp)}°C</div>
                                    <div class="forecast-desc">${day.description}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            let recommendation = '';
            if (data.temperature > 30) {
                recommendation = '☀️ Hot weather! Try our cold beverages and refreshing drinks.';
            } else if (data.description.includes('rain')) {
                recommendation = '🌧️ Rainy weather! Perfect time for hot tea, coffee, and comfort food.';
            } else if (data.temperature < 15) {
                recommendation = '❄️ Cold weather! Enjoy our warm beverages and hot meals.';
            }

            const recommendationHTML = recommendation ? `
                <div class="weather-recommendations">
                    ${recommendation}
                </div>
            ` : '';

            document.getElementById('weatherContainer').innerHTML = `
                <div class="main-weather">
                    <div class="weather-header">
                        <div>
                            <div class="weather-title">${data.city}, ${data.country}</div>
                            <div class="temperature-display">${Math.round(data.temperature)}°C</div>
                            <div class="weather-description">${data.description}</div>
                            <div class="feels-like">Feels like ${Math.round(data.feelsLike)}°C</div>
                        </div>
                        <div class="weather-icon-large">${weatherIcon}</div>
                    </div>

                    <div class="weather-details">
                        <div class="detail-card">
                            <div class="detail-label">💨 Wind Speed</div>
                            <div class="detail-value">${data.windSpeed} m/s</div>
                        </div>
                        <div class="detail-card">
                            <div class="detail-label">💧 Humidity</div>
                            <div class="detail-value">${data.humidity}%</div>
                        </div>
                        <div class="detail-card">
                            <div class="detail-label">🔽 Pressure</div>
                            <div class="detail-value">${data.pressure} hPa</div>
                        </div>
                        <div class="detail-card">
                            <div class="detail-label">👁️ Visibility</div>
                            <div class="detail-value">${(data.visibility / 1000).toFixed(1)} km</div>
                        </div>
                        <div class="detail-card">
                            <div class="detail-label">☁️ Cloudiness</div>
                            <div class="detail-value">${data.cloudiness}%</div>
                        </div>
                        <div class="detail-card">
                            <div class="detail-label">🌅 Sunrise</div>
                            <div class="detail-value">${sunrise}</div>
                        </div>
                        <div class="detail-card">
                            <div class="detail-label">🌇 Sunset</div>
                            <div class="detail-value">${sunset}</div>
                        </div>
                        <div class="detail-card">
                            <div class="detail-label">🌍 Timezone</div>
                            <div class="detail-value">UTC+${(data.timezone / 3600).toFixed(1)}</div>
                        </div>
                    </div>

                    ${recommendationHTML}
                    ${forecastHTML}
                </div>
            `;
        }

        // Get day name from index
        function getDayName(index) {
            const days = ['Today', 'Tomorrow', 'Day 3', 'Day 4', 'Day 5'];
            return days[index] || 'Day ' + (index + 1);
        }

        // Update last update time
        function updateLastUpdate() {
            const time = lastUpdate.toLocaleTimeString('en-US', { 
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('lastUpdate').textContent = time;
        }

        // Initialize with default city
        window.addEventListener('load', () => {
            searchCity('New Delhi');
        });
    </script>
</body>
</html>
