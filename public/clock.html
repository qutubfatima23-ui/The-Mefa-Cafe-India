<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Multiple Time Zones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: fadeIn 0.8s ease-in;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1rem;
            opacity: 0.9;
        }

        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .clock-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.6s ease-out;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .clock-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        .timezone-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
            text-align: center;
        }

        .timezone-region {
            font-size: 0.85rem;
            color: #999;
            text-align: center;
            margin-bottom: 15px;
        }

        .digital-time {
            font-size: 2.5rem;
            font-weight: bold;
            color: #333;
            text-align: center;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .date-display {
            font-size: 0.9rem;
            color: #666;
            text-align: center;
            margin-bottom: 15px;
        }

        .time-info {
            display: flex;
            justify-content: space-around;
            font-size: 0.85rem;
            color: #999;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .time-info-item {
            text-align: center;
        }

        .time-info-label {
            display: block;
            font-size: 0.75rem;
            color: #bbb;
            margin-bottom: 3px;
            text-transform: uppercase;
        }

        .time-info-value {
            display: block;
            color: #667eea;
            font-weight: bold;
        }

        .controls {
            text-align: center;
            margin-top: 30px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 25px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: white;
            color: #667eea;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
        }

        .btn-secondary:hover {
            background: white;
            color: #667eea;
        }

        .format-toggle {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .format-btn {
            padding: 8px 15px;
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .format-btn.active {
            background: white;
            color: #667eea;
        }

        .format-btn:hover {
            background: white;
            color: #667eea;
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            opacity: 0.8;
            font-size: 0.9rem;
        }

        .analog-clock {
            width: 150px;
            height: 150px;
            border: 3px solid #667eea;
            border-radius: 50%;
            position: relative;
            background: #f5f5f5;
            margin: 15px auto 0;
        }

        .clock-center {
            width: 12px;
            height: 12px;
            background: #667eea;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 10px;
        }

        .hour-hand {
            width: 6px;
            height: 40px;
            background: #667eea;
            margin-left: -3px;
        }

        .minute-hand {
            width: 4px;
            height: 55px;
            background: #764ba2;
            margin-left: -2px;
        }

        .second-hand {
            width: 2px;
            height: 60px;
            background: #ff6b6b;
            margin-left: -1px;
        }

        .clock-number {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
            color: #667eea;
        }

        .clock-number span {
            display: inline-block;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .clocks-grid {
                grid-template-columns: 1fr;
            }

            .digital-time {
                font-size: 2rem;
            }
        }

        .search-box {
            margin-bottom: 30px;
            text-align: center;
        }

        .search-box input {
            padding: 12px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .timezone-selector {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .timezone-tag {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .timezone-tag:hover,
        .timezone-tag.active {
            background: white;
            color: #667eea;
        }

        .no-results {
            text-align: center;
            color: white;
            padding: 40px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⏰ Digital Clock</h1>
            <p>Current time across different time zones</p>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search timezone (e.g., New York, Tokyo, London)...">
        </div>

        <div class="timezone-selector">
            <span class="timezone-tag active" data-region="all">All Timezones</span>
            <span class="timezone-tag" data-region="Asia">Asia</span>
            <span class="timezone-tag" data-region="Europe">Europe</span>
            <span class="timezone-tag" data-region="Americas">Americas</span>
            <span class="timezone-tag" data-region="Africa">Africa</span>
            <span class="timezone-tag" data-region="Australia">Australia</span>
        </div>

        <div class="format-toggle">
            <button class="format-btn active" id="format24">24 Hour</button>
            <button class="format-btn" id="format12">12 Hour</button>
            <button class="format-btn" id="toggleAnalog">Show Analog</button>
        </div>

        <div class="clocks-grid" id="clocksGrid">
            <!-- Clocks will be generated here -->
        </div>

        <div class="no-results" id="noResults" style="display: none;">
            No timezones found. Try a different search.
        </div>

        <div class="controls">
            <div class="btn-group">
                <button class="btn-primary" onclick="addRandomTimezone()">+ Add Random Timezone</button>
                <button class="btn-secondary" onclick="clearAllClocks()">Clear All</button>
            </div>
        </div>

        <div class="footer">
            <p>All times update in real-time • Click on a timezone tag to filter</p>
        </div>
    </div>

    <script>
        const timeZones = [
            // Asia
            { name: "Tokyo", zone: "Asia/Tokyo", region: "Asia", offset: "+9" },
            { name: "Shanghai", zone: "Asia/Shanghai", region: "Asia", offset: "+8" },
            { name: "Hong Kong", zone: "Asia/Hong_Kong", region: "Asia", offset: "+8" },
            { name: "Singapore", zone: "Asia/Singapore", region: "Asia", offset: "+8" },
            { name: "Bangkok", zone: "Asia/Bangkok", region: "Asia", offset: "+7" },
            { name: "Dubai", zone: "Asia/Dubai", region: "Asia", offset: "+4" },
            { name: "New Delhi", zone: "Asia/Kolkata", region: "Asia", offset: "+5:30" },
            { name: "Mumbai", zone: "Asia/Kolkata", region: "Asia", offset: "+5:30" },
            { name: "Karachi", zone: "Asia/Karachi", region: "Asia", offset: "+5" },
            { name: "Jakarta", zone: "Asia/Jakarta", region: "Asia", offset: "+7" },
            { name: "Manila", zone: "Asia/Manila", region: "Asia", offset: "+8" },
            { name: "Seoul", zone: "Asia/Seoul", region: "Asia", offset: "+9" },
            { name: "Bangkok", zone: "Asia/Bangkok", region: "Asia", offset: "+7" },
            
            // Europe
            { name: "London", zone: "Europe/London", region: "Europe", offset: "+0/+1" },
            { name: "Paris", zone: "Europe/Paris", region: "Europe", offset: "+1/+2" },
            { name: "Berlin", zone: "Europe/Berlin", region: "Europe", offset: "+1/+2" },
            { name: "Rome", zone: "Europe/Rome", region: "Europe", offset: "+1/+2" },
            { name: "Moscow", zone: "Europe/Moscow", region: "Europe", offset: "+3" },
            { name: "Istanbul", zone: "Europe/Istanbul", region: "Europe", offset: "+3" },
            { name: "Amsterdam", zone: "Europe/Amsterdam", region: "Europe", offset: "+1/+2" },
            { name: "Madrid", zone: "Europe/Madrid", region: "Europe", offset: "+1/+2" },
            { name: "Prague", zone: "Europe/Prague", region: "Europe", offset: "+1/+2" },
            
            // Americas
            { name: "New York", zone: "America/New_York", region: "Americas", offset: "-5/-4" },
            { name: "Los Angeles", zone: "America/Los_Angeles", region: "Americas", offset: "-8/-7" },
            { name: "Chicago", zone: "America/Chicago", region: "Americas", offset: "-6/-5" },
            { name: "Denver", zone: "America/Denver", region: "Americas", offset: "-7/-6" },
            { name: "Toronto", zone: "America/Toronto", region: "Americas", offset: "-5/-4" },
            { name: "Mexico City", zone: "America/Mexico_City", region: "Americas", offset: "-6/-5" },
            { name: "São Paulo", zone: "America/Sao_Paulo", region: "Americas", offset: "-3/-2" },
            { name: "Buenos Aires", zone: "America/Argentina/Buenos_Aires", region: "Americas", offset: "-3" },
            
            // Africa
            { name: "Cairo", zone: "Africa/Cairo", region: "Africa", offset: "+2" },
            { name: "Lagos", zone: "Africa/Lagos", region: "Africa", offset: "+1" },
            { name: "Johannesburg", zone: "Africa/Johannesburg", region: "Africa", offset: "+2" },
            { name: "Nairobi", zone: "Africa/Nairobi", region: "Africa", offset: "+3" },
            
            // Australia
            { name: "Sydney", zone: "Australia/Sydney", region: "Australia", offset: "+10/+11" },
            { name: "Melbourne", zone: "Australia/Melbourne", region: "Australia", offset: "+10/+11" },
            { name: "Brisbane", zone: "Australia/Brisbane", region: "Australia", offset: "+10" },
            { name: "Perth", zone: "Australia/Perth", region: "Australia", offset: "+8" },
        ];

        let selectedClocks = [];
        let format24Hour = true;
        let showAnalogClock = false;
        let selectedRegion = 'all';

        // Initialize with popular timezones
        function initializeClocks() {
            selectedClocks = [
                timeZones.find(t => t.name === "New York"),
                timeZones.find(t => t.name === "London"),
                timeZones.find(t => t.name === "Tokyo"),
                timeZones.find(t => t.name === "New Delhi"),
                timeZones.find(t => t.name === "Sydney"),
            ];
            renderClocks();
        }

        function renderClocks() {
            const grid = document.getElementById('clocksGrid');
            const noResults = document.getElementById('noResults');
            const search = document.getElementById('searchInput').value.toLowerCase();

            let filtered = selectedClocks.filter(clock => {
                const matchesSearch = clock.name.toLowerCase().includes(search) || 
                                     clock.zone.toLowerCase().includes(search);
                const matchesRegion = selectedRegion === 'all' || clock.region === selectedRegion;
                return matchesSearch && matchesRegion;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }

            noResults.style.display = 'none';
            grid.innerHTML = filtered.map((clock, index) => `
                <div class="clock-card" data-index="${index}">
                    <div class="timezone-name">${clock.name}</div>
                    <div class="timezone-region">${clock.zone}</div>
                    <div class="digital-time" data-timezone="${clock.zone}">--:--:--</div>
                    <div class="date-display" data-timezone="${clock.zone}">Loading...</div>
                    ${showAnalogClock ? `
                        <div class="analog-clock" data-timezone="${clock.zone}">
                            <div class="clock-center"></div>
                            <div class="hand hour-hand" data-timezone="${clock.zone}"></div>
                            <div class="hand minute-hand" data-timezone="${clock.zone}"></div>
                            <div class="hand second-hand" data-timezone="${clock.zone}"></div>
                            <div class="clock-number">
                                <span style="top: 5px;">12</span>
                                <span style="right: 5px; top: 50%; transform: translateX(0) translateY(-50%);">3</span>
                                <span style="bottom: 5px;">6</span>
                                <span style="left: 5px; top: 50%; transform: translateX(0) translateY(-50%);">9</span>
                            </div>
                        </div>
                    ` : ''}
                    <div class="time-info">
                        <div class="time-info-item">
                            <span class="time-info-label">Offset</span>
                            <span class="time-info-value">${clock.offset}</span>
                        </div>
                        <div class="time-info-item">
                            <span class="time-info-label">Region</span>
                            <span class="time-info-value">${clock.region}</span>
                        </div>
                    </div>
                    <button class="btn-secondary" style="width: 100%; margin-top: 15px; padding: 8px;" onclick="removeClock('${clock.zone}')">Remove</button>
                </div>
            `).join('');

            updateAllClocks();
        }

        function updateAllClocks() {
            document.querySelectorAll('[data-timezone]').forEach(element => {
                const timezone = element.getAttribute('data-timezone');
                const date = new Date().toLocaleString('en-US', { timeZone: timezone });
                const dateObj = new Date(date);

                // Update digital time
                if (element.classList.contains('digital-time')) {
                    let timeString;
                    if (format24Hour) {
                        timeString = dateObj.toLocaleTimeString('en-US', {
                            hour12: false,
                            timeZone: timezone,
                            hour: '2-digit',
                            minute: '2-digit',
                            second: '2-digit'
                        });
                    } else {
                        timeString = dateObj.toLocaleTimeString('en-US', {
                            hour12: true,
                            timeZone: timezone,
                            hour: '2-digit',
                            minute: '2-digit',
                            second: '2-digit'
                        });
                    }
                    element.textContent = timeString;
                }

                // Update date
                if (element.classList.contains('date-display')) {
                    const dateString = dateObj.toLocaleDateString('en-US', {
                        timeZone: timezone,
                        weekday: 'short',
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric'
                    });
                    element.textContent = dateString;
                }

                // Update analog clock hands
                if (element.classList.contains('hour-hand')) {
                    const hours = dateObj.getHours();
                    const minutes = dateObj.getMinutes();
                    const hourDegrees = (hours % 12) * 30 + minutes * 0.5;
                    element.style.transform = `rotate(${hourDegrees}deg)`;
                }

                if (element.classList.contains('minute-hand')) {
                    const minutes = dateObj.getMinutes();
                    const seconds = dateObj.getSeconds();
                    const minuteDegrees = minutes * 6 + seconds * 0.1;
                    element.style.transform = `rotate(${minuteDegrees}deg)`;
                }

                if (element.classList.contains('second-hand')) {
                    const seconds = dateObj.getSeconds();
                    const secondDegrees = seconds * 6;
                    element.style.transform = `rotate(${secondDegrees}deg)`;
                }
            });
        }

        function removeClock(timezone) {
            selectedClocks = selectedClocks.filter(clock => clock.zone !== timezone);
            renderClocks();
        }

        function addRandomTimezone() {
            const random = timeZones[Math.floor(Math.random() * timeZones.length)];
            if (!selectedClocks.find(c => c.zone === random.zone)) {
                selectedClocks.push(random);
                renderClocks();
            }
        }

        function clearAllClocks() {
            selectedClocks = [];
            renderClocks();
        }

        // Event listeners
        document.getElementById('format24').addEventListener('click', function() {
            format24Hour = true;
            document.querySelectorAll('.format-btn').forEach(btn => btn.classList.remove('active'));
            this.classList.add('active');
            updateAllClocks();
        });

        document.getElementById('format12').addEventListener('click', function() {
            format24Hour = false;
            document.querySelectorAll('.format-btn').forEach(btn => btn.classList.remove('active'));
            this.classList.add('active');
            updateAllClocks();
        });

        document.getElementById('toggleAnalog').addEventListener('click', function() {
            showAnalogClock = !showAnalogClock;
            renderClocks();
        });

        document.getElementById('searchInput').addEventListener('input', renderClocks);

        document.querySelectorAll('.timezone-tag').forEach(tag => {
            tag.addEventListener('click', function() {
                document.querySelectorAll('.timezone-tag').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                selectedRegion = this.getAttribute('data-region');
                renderClocks();
            });
        });

        // Update clocks every second
        setInterval(updateAllClocks, 1000);

        // Initialize
        initializeClocks();
    </script>
</body>
</html>
